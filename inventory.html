<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Item Form</title>
    <link rel="stylesheet" href="inventory.css" />
</head>
<body>

    <div class="form-container">
        <h2>Add item to inventory</h2>

        <form action="/add-item" method="post">

            <!-- Source-->
            <label for="source">Source Name</label>
            <input type="text" id="source" name="source" placeholder="Enter source name" />

            <!-- Item Name -->
            <label for="item-name">Item Name</label>
            <input type="text" id="item-name" name="item-name" placeholder="Enter item name" />

            <!-- Quantity -->
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" min="1" placeholder="Enter quantity" />

            <!-- Expiration Type -->
            <label for="expiration-date">Expiration Date</label>
            <input type="date" id="expiration-date" name="expiration-date" />

            <!-- Food Checkbox -->
            <div class="checkbox-group">
                <input type="checkbox" id="is-food" name="is-food" />
                <label for="is-food">Is this food?</label>
            </div>

            <!-- Submit -->
            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
